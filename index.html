<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comercializadora Makro SPA | Todo para tu obra</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header id="header-placeholder" class="main-header"></header>
    
<main class="main-content-area">
    <section class="hero-carrusel">
    <div class="slider-wrapper">
        <div class="slider-container" id="slider-main">
            <div class="slide-item"><img src="images/banner/banner1.png" alt="Banner 1"></div>
            <div class="slide-item"><img src="images/banner/banner2.png" alt="Banner 2"></div>
            <div class="slide-item"><img src="images/banner/banner3.png" alt="Banner 3"></div>
            <div class="slide-item"><img src="images/banner/banner4.png" alt="Banner 4"></div>
            <div class="slide-item"><img src="images/banner/banner5.png" alt="Banner 5"></div>
        </div>

        <button class="slider-btn prev" onclick="moveSlider(-1)">&#10094;</button>
        <button class="slider-btn next" onclick="moveSlider(1)">&#10095;</button>
    </div>

</main>
    <div id="carrito-placeholder"></div>
    <div id="whatsapp-placeholder"></div>
    <footer id="footer-placeholder" class="main-footer"></footer>
    <script src="js/main.js"></script>
    
</body>
</html>
